<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos de Hyrule | Buscador Zelda</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css">
  <script type="module" src="./js/ui.js" defer></script>
</head>

<body class="pagina">
  <span class="pagina__fondo"></span>

  <header class="cabecera cabecera--pequena">
    <nav class="navegacion">
      <a class="navegacion__marca" href="index.html">Hyrule Search</a>

      <ul class="navegacion__lista">
        <li>
          <a class="navegacion__enlace" href="index.html">Buscador</a>
        </li>
        <li>
          <a class="navegacion__enlace navegacion__enlace--activo" href="favoritos.html">Favoritos</a>
        </li>
        <li>
          <a class="navegacion__enlace" href="catalogo_XML.html">Catalogo XML</a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="pagina__contenido">
    <section class="resumen">
      <ul class="resumen__lista">
        <li class="resumen__item">
          <span class="resumen__etiqueta">Total guardado</span>
          <output class="resumen__valor js-favoritos-total">0</output>
        </li>
      </ul>
    </section>

    <section class="panel panel--resultados">
      <header class="panel__franja">
        <p class="panel__kicker">Favoritos</p>
        <h2 class="panel__titulo">Galeria guardada</h2>

        <button class="boton boton--secundario js-favoritos-vaciar">
          Vaciar favoritos
        </button>
      </header>

      <p class="panel__mensaje js-favoritos-mensaje">
        Tus favoritos apareceran aqui.
      </p>

      <ul class="galeria js-favoritos-lista"></ul>
    </section>
  </main>

</html>
